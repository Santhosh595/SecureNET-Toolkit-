<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechFinger — SecureNET</title>
  <style>
    :root { --bg:#0d1117; --card:#161b22; --accent:#06b6d4; --text:#e6edf3; --muted:#8b949e; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--text); }
    header { padding:24px; background:var(--card); border-bottom:1px solid #21262d; }
    header h1 { margin:0; color:var(--accent); }
    main { max-width:980px; margin:0 auto; padding:24px; }
    .panel { background:var(--card); border:1px solid #21262d; border-radius:10px; padding:20px; }
    input { width:100%; padding:12px; background:#0d1117; border:1px solid #30363d; color:var(--text); border-radius:8px; }
    button { margin-top:12px; padding:10px 18px; background:var(--accent); color:#06222a; border:0; border-radius:8px; font-weight:600; cursor:pointer; }
    .row { padding:10px 14px; margin:6px 0; background:#0d1117; border-radius:6px; border-left:4px solid var(--accent); }
  </style>
</head>
<body>
  <header><h1>TechFinger</h1><p>Web technology fingerprinting (WhatWeb/httpx-style)</p></header>
  <main>
    <div class="panel">
      <input id="target" placeholder="https://example.com" />
      <button onclick="runScan()">Fingerprint</button>
    </div>
    <div id="results" style="margin-top:20px;"></div>
  </main>
  <script>
    async function runScan() {
      const target = document.getElementById('target').value.trim();
      const box = document.getElementById('results');
      if (!target) { box.innerHTML = '<p style="color:#ff7a45">Enter a target URL.</p>'; return; }
      box.innerHTML = '<p style="color:#8b949e">Fingerprinting…</p>';
      try {
        const r = await fetch('/scan', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ target }) });
        const d = await r.json();
        if (d.error) { box.innerHTML = '<p style="color:#ff7a45">'+d.error+'</p>'; return; }
        const rows = (d.detected||[]).map(t =>
          `<div class="row"><strong>${t.category}: ${t.name}</strong></div>`).join('') || '<p style="color:#36cfc9">Nothing identified.</p>';
        box.innerHTML = `<p style="color:#8b949e">${d.server||''} · HTTP ${d.status} · ${d.title||''}</p>` + rows;
      } catch(e) { box.innerHTML = '<p style="color:#ff7a45">Failed: '+e+'</p>'; }
    }
  </script>
</body>
</html>
