<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudSentry — SecureNET</title>
  <style>
    :root { --bg:#0d1117; --card:#161b22; --accent:#a855f7; --text:#e6edf3; --muted:#8b949e; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--text); }
    header { padding:24px; background:var(--card); border-bottom:1px solid #21262d; }
    header h1 { margin:0; color:var(--accent); }
    main { max-width:980px; margin:0 auto; padding:24px; }
    .panel { background:var(--card); border:1px solid #21262d; border-radius:10px; padding:20px; }
    button { padding:10px 18px; background:var(--accent); color:#2a0033; border:0; border-radius:8px; font-weight:600; cursor:pointer; }
    .row { padding:10px 14px; margin:6px 0; background:#0d1117; border-radius:6px; border-left:4px solid var(--accent); }
    .pass { border-color:#36cfc9; } .fail { border-color:#ff4d4f; } .info { border-color:#8b949e; }
  </style>
</head>
<body>
  <header><h1>CloudSentry</h1><p>Multi-cloud security posture (read-only)</p></header>
  <main>
    <div class="panel"><button onclick="runScan()">Run Posture Checks</button></div>
    <div id="results" style="margin-top:20px;"></div>
  </main>
  <script>
    async function runScan() {
      const box = document.getElementById('results');
      box.innerHTML = '<p class="code">Running checks…</p>';
      try {
        const r = await fetch('/scan', { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
        const data = await r.json();
        box.innerHTML = data.map(c =>
          `<div class="row ${c.status.toLowerCase()}"><strong>${c.provider.toUpperCase()} · ${c.check_id}</strong>
           <span> — ${c.title}</span><br><span style="color:#8b949e">${c.status} · ${c.severity} · ${c.detail||'—'}</span></div>`
        ).join('');
      } catch(e) { box.innerHTML = '<p style="color:#ff7a45">Failed: '+e+'</p>'; }
    }
  </script>
</body>
</html>
