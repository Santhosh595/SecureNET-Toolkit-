# VulnProbe template — Missing X-Content-Type-Options
# id: content-sniffing-enabled | severity: LOW | category: misconfiguration
id: content-sniffing-enabled
name: Missing X-Content-Type-Options
description: Detects missing MIME-sniffing protection.
author: SecureNET
severity: LOW
category: misconfiguration
tags:
- sniffing
- misconfig
- header
references:
- https://owasp.org/www-project-top-ten/
requests:
- method: GET
  path:
  - /
  headers:
    User-Agent: Mozilla/5.0 (compatible; SecureNET/1.0)
  follow_redirects: true
  timeout: 10
  matchers:
    operator: AND
    conditions:
    - type: status
      values:
      - 200
      - 301
      - 302
      - 403
      - 404
    - type: header
      header: X-Content-Type-Options
      values:
      - nosniff
      condition: AND
      negate: true
remediation: 'Set ''X-Content-Type-Options: nosniff'' to prevent MIME sniffing.'
