# VulnProbe template — OData Service Exposed
# id: odata-exposed | severity: LOW | category: api-security
id: odata-exposed
name: OData Service Exposed
description: Detects exposed OData service metadata.
author: SecureNET
severity: LOW
category: api-security
tags:
- odata
- api
- exposure
references:
- https://owasp.org/www-project-api-security/
requests:
- method: GET
  path:
  - /odata
  - /odata/$metadata
  - /api/odata
  headers:
    User-Agent: Mozilla/5.0 (compatible; SecureNET/1.0)
    Accept: application/json
  follow_redirects: true
  timeout: 10
  matchers:
    operator: AND
    conditions:
    - type: status
      values:
      - 200
      - 302
    - type: word
      part: body
      words:
      - swagger
      - openapi
      - graphql
      - actuator
      - odata
      - schema
      - __typename
      condition: OR
remediation: Restrict OData metadata visibility. Authenticate service documents in production.
