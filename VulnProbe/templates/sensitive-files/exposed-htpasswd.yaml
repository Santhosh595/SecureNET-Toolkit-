# VulnProbe template — Exposed .htpasswd
# id: exposed-htpasswd | severity: HIGH | category: sensitive-files
id: exposed-htpasswd
name: Exposed .htpasswd
description: Detects exposed Apache .htpasswd files.
author: SecureNET
severity: HIGH
category: sensitive-files
tags:
- htpasswd
- auth
- exposure
references:
- https://owasp.org/www-project-top-ten/
requests:
- method: GET
  path:
  - /.htpasswd
  - /admin/.htpasswd
  headers:
    User-Agent: Mozilla/5.0 (compatible; SecureNET/1.0)
  follow_redirects: false
  timeout: 10
  matchers:
    operator: AND
    conditions:
    - type: status
      values:
      - 200
    - type: size
      comparison: lt
      size: 1048576
  extractors:
  - type: regex
    name: snippet
    part: body
    pattern: (password|secret|key|token|DB_|aws_|private)
    group: 0
remediation: Store outside web root. Use hashed credentials and restrict file permissions.
