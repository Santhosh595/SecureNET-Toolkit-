# VulnProbe template — Exposed AWS Credentials
# id: exposed-aws-credentials | severity: CRITICAL | category: sensitive-files
id: exposed-aws-credentials
name: Exposed AWS Credentials
description: Detects exposed AWS credential files.
author: SecureNET
severity: CRITICAL
category: sensitive-files
tags:
- aws
- credentials
- secrets
references:
- https://owasp.org/www-project-top-ten/
requests:
- method: GET
  path:
  - /.aws/credentials
  - /aws/credentials
  headers:
    User-Agent: Mozilla/5.0 (compatible; SecureNET/1.0)
  follow_redirects: false
  timeout: 10
  matchers:
    operator: AND
    conditions:
    - type: status
      values:
      - 200
    - type: size
      comparison: lt
      size: 1048576
  extractors:
  - type: regex
    name: snippet
    part: body
    pattern: (password|secret|key|token|DB_|aws_|private)
    group: 0
remediation: Rotate the exposed keys immediately. Use IAM roles / instance profiles, never static keys.
