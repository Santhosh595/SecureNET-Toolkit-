# VulnProbe template — Exposed Laravel .env
# id: exposed-laravel-env | severity: CRITICAL | category: sensitive-files
id: exposed-laravel-env
name: Exposed Laravel .env
description: Detects exposed Laravel environment file.
author: SecureNET
severity: CRITICAL
category: sensitive-files
tags:
- laravel
- env
- secrets
references:
- https://owasp.org/www-project-top-ten/
requests:
- method: GET
  path:
  - /.env
  - /.env.backup
  - /.env.save
  headers:
    User-Agent: Mozilla/5.0 (compatible; SecureNET/1.0)
  follow_redirects: false
  timeout: 10
  matchers:
    operator: AND
    conditions:
    - type: status
      values:
      - 200
    - type: size
      comparison: lt
      size: 1048576
  extractors:
  - type: regex
    name: snippet
    part: body
    pattern: (password|secret|key|token|DB_|aws_|private)
    group: 0
remediation: Block .env in web server. Rotate APP_KEY and all secrets. Keep out of VCS.
