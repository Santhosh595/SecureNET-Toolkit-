# VulnProbe template — Exposed .git/config
# id: exposed-git-config | severity: HIGH | category: sensitive-files
id: exposed-git-config
name: Exposed .git/config
description: Detects exposed Git configuration file.
author: SecureNET
severity: HIGH
category: sensitive-files
tags:
- git
- source
- exposure
references:
- https://owasp.org/www-project-top-ten/
requests:
- method: GET
  path:
  - /.git/config
  headers:
    User-Agent: Mozilla/5.0 (compatible; SecureNET/1.0)
  follow_redirects: false
  timeout: 10
  matchers:
    operator: AND
    conditions:
    - type: status
      values:
      - 200
    - type: size
      comparison: lt
      size: 1048576
  extractors:
  - type: regex
    name: snippet
    part: body
    pattern: (password|secret|key|token|DB_|aws_|private)
    group: 0
remediation: Remove .git from web roots. Add server rules denying access to .git directories.
