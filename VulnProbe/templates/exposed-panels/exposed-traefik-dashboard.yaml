# VulnProbe template — Exposed Traefik Dashboard
# id: exposed-traefik-dashboard | severity: MEDIUM | category: exposed-panels
id: exposed-traefik-dashboard
name: Exposed Traefik Dashboard
description: Detects publicly accessible Traefik API/dashboard.
author: SecureNET
severity: MEDIUM
category: exposed-panels
tags:
- traefik
- proxy
- exposure
references:
- https://owasp.org/www-project-top-ten/
requests:
- method: GET
  path:
  - /dashboard/
  - /api/rawdata
  - /
  headers:
    User-Agent: Mozilla/5.0 (compatible; SecureNET/1.0)
  follow_redirects: true
  timeout: 10
  matchers:
    operator: OR
    conditions:
    - type: status
      values:
      - 200
      - 302
    - type: word
      part: body
      words:
      - login
      - dashboard
      - admin
      - panel
      condition: OR
remediation: Disable insecure API/dashboard or protect with middleware auth. Do not expose on public routers.
