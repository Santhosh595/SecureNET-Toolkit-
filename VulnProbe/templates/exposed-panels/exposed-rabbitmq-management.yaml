# VulnProbe template — Exposed RabbitMQ Management
# id: exposed-rabbitmq-management | severity: MEDIUM | category: exposed-panels
id: exposed-rabbitmq-management
name: Exposed RabbitMQ Management
description: Detects publicly accessible RabbitMQ management plugin.
author: SecureNET
severity: MEDIUM
category: exposed-panels
tags:
- rabbitmq
- message
- exposure
references:
- https://owasp.org/www-project-top-ten/
requests:
- method: GET
  path:
  - /
  - /api/overview
  - /login
  headers:
    User-Agent: Mozilla/5.0 (compatible; SecureNET/1.0)
  follow_redirects: true
  timeout: 10
  matchers:
    operator: OR
    conditions:
    - type: status
      values:
      - 200
      - 302
    - type: word
      part: body
      words:
      - login
      - dashboard
      - admin
      - panel
      condition: OR
remediation: Disable management plugin on public interfaces. Restrict via firewall and enable auth.
