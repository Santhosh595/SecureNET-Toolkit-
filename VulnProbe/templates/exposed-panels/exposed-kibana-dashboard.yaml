# VulnProbe template — Exposed Kibana Dashboard
# id: exposed-kibana-dashboard | severity: MEDIUM | category: exposed-panels
id: exposed-kibana-dashboard
name: Exposed Kibana Dashboard
description: Detects publicly accessible Kibana dashboards.
author: SecureNET
severity: MEDIUM
category: exposed-panels
tags:
- kibana
- elasticsearch
- exposure
references:
- https://owasp.org/www-project-top-ten/
requests:
- method: GET
  path:
  - /kibana
  - /app/kibana
  - /
  headers:
    User-Agent: Mozilla/5.0 (compatible; SecureNET/1.0)
  follow_redirects: true
  timeout: 10
  matchers:
    operator: OR
    conditions:
    - type: status
      values:
      - 200
      - 302
    - type: word
      part: body
      words:
      - login
      - dashboard
      - admin
      - panel
      condition: OR
remediation: Bind Kibana to localhost or internal network; front with authenticated reverse proxy.
