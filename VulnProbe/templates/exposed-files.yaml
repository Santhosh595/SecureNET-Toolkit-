id: exposed-sensitive-files
info:
  name: Exposed Sensitive Files
  author: SecureNET
  severity: medium
  description: Detects publicly readable config, env, and backup files.
requests:
  - method: GET
    path: /robots.txt
    matchers:
      - type: status
        status: [200]
  - method: GET
    path: /.env
    matchers:
      - type: status
        status: [200]
      - type: word
        words: ["DB_PASSWORD", "APP_SECRET", "API_KEY"]
        condition: or
    matchers-condition: and
  - method: GET
    path: /backup.zip
    matchers:
      - type: status
        status: [200]
