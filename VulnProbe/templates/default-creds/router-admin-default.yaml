# VulnProbe template — Router Admin Default Page
# id: router-admin-default | severity: MEDIUM | category: default-creds
id: router-admin-default
name: Router Admin Default Page
description: Detects router admin interfaces.
author: SecureNET
severity: MEDIUM
category: default-creds
tags:
- router
- admin
- default
references:
- https://owasp.org/www-project-top-ten/
requests:
- method: GET
  path:
  - /
  - /login
  - /cgi-bin/luci
  headers:
    User-Agent: Mozilla/5.0 (compatible; SecureNET/1.0)
  follow_redirects: true
  timeout: 10
  matchers:
    operator: AND
    conditions:
    - type: status
      values:
      - 200
      - 401
      - 403
    - type: word
      part: body
      words:
      - login
      - password
      - sign in
      - username
      condition: OR
remediation: Change default admin password. Disable remote admin. Update firmware.
