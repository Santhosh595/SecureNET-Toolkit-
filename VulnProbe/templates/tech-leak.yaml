id: tech-version-disclosure
info:
  name: Technology Version Disclosure
  author: SecureNET
  severity: low
  description: Detects server/technology banners leaking version info via headers or body.
requests:
  - method: GET
    path: /
    matchers:
      - type: regex
        regex: ["Server: [A-Za-z]+/[0-9]", "X-Powered-By: [A-Za-z]+/[0-9]", "nginx/[0-9]", "Apache/[0-9]"]
        condition: or
