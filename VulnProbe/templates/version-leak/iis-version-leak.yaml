# VulnProbe template — IIS Version Leak
# id: iis-version-leak | severity: LOW | category: version-leak
id: iis-version-leak
name: IIS Version Leak
description: Server header discloses Microsoft-IIS version.
author: SecureNET
severity: LOW
category: version-leak
tags:
- iis
- version
- disclosure
references:
- https://owasp.org/www-project-top-ten/
requests:
- method: GET
  path:
  - /
  headers:
    User-Agent: Mozilla/5.0 (compatible; SecureNET/1.0)
  follow_redirects: true
  timeout: 10
  matchers:
    operator: AND
    conditions:
    - type: status
      values:
      - 200
      - 301
      - 302
      - 403
      - 404
    - type: header
      header: Server
      values:
      - Apache
      - nginx
      - Microsoft-IIS
      condition: OR
    - type: regex
      part: header
      pattern: (Apache/[0-9]|nginx/[0-9]|Microsoft-IIS/[0-9])
      case_insensitive: true
remediation: Remove server banner via URLRewrite outbound rule or registry 'DisableServerHeader'.
