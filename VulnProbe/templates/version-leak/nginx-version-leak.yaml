# VulnProbe template — Nginx Version Leak
# id: nginx-version-leak | severity: LOW | category: version-leak
id: nginx-version-leak
name: Nginx Version Leak
description: Server header discloses nginx version.
author: SecureNET
severity: LOW
category: version-leak
tags:
- nginx
- version
- disclosure
references:
- https://owasp.org/www-project-top-ten/
requests:
- method: GET
  path:
  - /
  headers:
    User-Agent: Mozilla/5.0 (compatible; SecureNET/1.0)
  follow_redirects: true
  timeout: 10
  matchers:
    operator: AND
    conditions:
    - type: status
      values:
      - 200
      - 301
      - 302
      - 403
      - 404
    - type: header
      header: Server
      values:
      - Apache
      - nginx
      - Microsoft-IIS
      condition: OR
    - type: regex
      part: header
      pattern: (Apache/[0-9]|nginx/[0-9]|Microsoft-IIS/[0-9])
      case_insensitive: true
remediation: Set 'server_tokens off;' in nginx config to hide version.
