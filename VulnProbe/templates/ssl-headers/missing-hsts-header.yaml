# VulnProbe template — Missing HSTS Header
# id: missing-hsts-header | severity: LOW | category: ssl-headers
id: missing-hsts-header
name: Missing HSTS Header
description: Detects missing Strict-Transport-Security header.
author: SecureNET
severity: LOW
category: ssl-headers
tags:
- hsts
- https
- header
references:
- https://owasp.org/www-project-top-ten/
requests:
- method: GET
  path:
  - /
  headers:
    User-Agent: Mozilla/5.0 (compatible; SecureNET/1.0)
  follow_redirects: true
  timeout: 10
  matchers:
    operator: AND
    conditions:
    - type: status
      values:
      - 200
      - 301
      - 302
      - 403
      - 404
    - type: header
      header: Strict-Transport-Security
      values:
      - ''
      condition: AND
      negate: true
remediation: 'Set ''Strict-Transport-Security: max-age=63072000; includeSubDomains'' on HTTPS responses.'
